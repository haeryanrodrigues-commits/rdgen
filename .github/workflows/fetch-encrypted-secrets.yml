name: Fetch Encrypted Secrets

on:
  workflow_call:
    inputs:
      zip_url_json:
        required: true
        type: string

jobs:
  download-zip:
    runs-on: ubuntu-latest
    steps:
    - name: Download with Retry
    timeout-minutes: 15
    shell: python
    run: |
      import json
      import time
      import urllib.error
      import urllib.parse
      import urllib.request

      input_data = json.loads('${{ inputs.zip_url_json }}')
      base_url = input_data["url"].rstrip("/")
      filename = input_data["file"]
      encoded_filename = urllib.parse.quote(filename)
      url = f"{base_url}/get_zip?filename={encoded_filename}"

      max_attempts = 6
      for attempt in range(1, max_attempts + 1):
        print(f"Downloading (attempt {attempt}/{max_attempts}): {url}")
        try:
          with urllib.request.urlopen(url, timeout=90) as response:
            status = getattr(response, "status", 200)
            if status < 200 or status >= 300:
              raise RuntimeError(f"Unexpected HTTP status: {status}")
            payload = response.read()

          if not payload:
            raise RuntimeError("Downloaded file is empty")

          with open("secrets.zip", "wb") as target:
            target.write(payload)

          print(f"Download complete ({len(payload)} bytes)")
          break
        except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, RuntimeError) as err:
          if attempt == max_attempts:
            raise
          sleep_s = 10 * attempt
          print(f"Attempt {attempt} failed: {err}. Retrying in {sleep_s}s...")
          time.sleep(sleep_s)

      - name: Upload Encrypted Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1
